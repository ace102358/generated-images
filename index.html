<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>POGO 工具箱 | 金昇工作室</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Inter:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  /* ==================== 引入額外中文字體 ==================== */
  /* jf open 粉圓 */
  @font-face {
    font-family: 'jf-openhuninn';
    src: url('https://cdn.jsdelivr.net/gh/marsnow/open-huninn-web-font@1.1/font/jf-openhuninn.woff2') format('woff2'),
         url('https://cdn.jsdelivr.net/gh/marsnow/open-huninn-web-font@1.1/font/jf-openhuninn.woff') format('woff');
    font-display: swap;
  }
  /* 台北黑體 (Taipei Sans TC) */
  @font-face {
    font-family: 'Taipei Sans TC Beta';
    src: url('https://cdn.jsdelivr.net/gh/roberthsu2003/Taipei-Sans-TC/TaipeiSansTCBeta-Regular.ttf') format('truetype');
    font-display: swap;
  }

  /* ==================== 核心變數 (Cyberpunk 風格) ==================== */
  :root {
    --primary: #bb86fc;
    --primary-glow: rgba(187, 134, 252, 0.4);
    --bg-gradient: radial-gradient(circle at top left, #2a1a44, #0d0d0d 70%);
    --glass-bg: rgba(20, 20, 20, 0.75);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text-main: #ffffff;
    --text-muted: #b0b0b0;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
  }

  /* 滾動條 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  /* ==================== Header & Tabs ==================== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13, 13, 13, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .brand {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #fff, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .tabs { display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; }
  .tab-btn {
    background: none; border: none; color: var(--text-muted);
    padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: 0.3s;
  }
  .tab-btn.active { background: rgba(255,255,255,0.15); color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

  /* ==================== 佈局系統 ==================== */
  .view-section { 
    display: none; padding: 20px; max-width: 1400px; margin: 0 auto;
    animation: fadeIn 0.4s forwards;
  }
  .view-section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .layout-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }

  /* ==================== 拖拽區與預覽 ==================== */
  .drop-zone {
    border: 2px dashed var(--glass-border); border-radius: 24px;
    min-height: 500px; background: rgba(0,0,0,0.2);
    display: flex; flex-direction: column; align-items: center;
    transition: 0.3s; position: relative;
  }
  .drop-zone.empty { justify-content: center; cursor: pointer; }
  .drop-zone.drag-over {
    border-color: var(--primary); background: rgba(187, 134, 252, 0.08);
    box-shadow: 0 0 30px var(--primary-glow) inset;
  }
  
  /* 空狀態提示 */
  #genEmptyState { text-align: center; pointer-events: none; }
  
  /* 生成器網格 */
  #previewGrid {
    display: grid; width: 100%; padding: 20px; gap: 20px;
    align-content: start; /* 防止高度撐開 */
  }

  .thumb {
    aspect-ratio: 0.466; border-radius: 16px; overflow: hidden;
    position: relative; cursor: grab; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    background: #222;
  }
  .thumb:hover { transform: translateY(-4px); z-index: 10; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb.dragging { opacity: 0.5; border: 2px dashed var(--primary); transform: scale(0.9); }
  .thumb.drag-over { transform: scale(1.05); border: 2px solid var(--primary); }

  /* ==================== 控制面板 ==================== */
  .controls-panel {
    background: var(--glass-bg); backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); border-radius: 24px;
    padding: 24px; height: fit-content;
    position: sticky; top: 90px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }

  h3 { margin: 0 0 16px; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
  
  .control-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 8px; font-size: 13px; color: #ddd; }

  /* 輸入元件 */
  select, input[type="text"], input[type="number"] {
    width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
    color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none;
    transition: 0.2s; font-family: inherit;
  }
  select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #cf9eff, #7b4dff); color: #000;
    box-shadow: 0 4px 15px var(--primary-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  .btn-danger { background: rgba(255, 82, 82, 0.2); color: #ff8080; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); box-shadow: none; }

  input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }
  .slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: #ccc; }

  /* ==================== 浮水印 & 壓縮 ==================== */
  #wmPreviewBox {
    width: 100%; min-height: 500px; background: #000;
    border-radius: 20px; position: relative; overflow: hidden;
    border: 2px dashed var(--glass-border);
    cursor: pointer;
  }
  #wmCanvas { 
    max-width: 95%; max-height: 95%; 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
  }
  #wmPlaceholder {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #666; width: 100%; pointer-events: none;
  }

  .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .pos-btn { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; transition: 0.2s; }
  .pos-btn.active { background: var(--primary); color: #000; font-weight: bold; }
  
  .file-item {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    padding: 12px 16px; border-radius: 12px; margin-top: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ==================== 手機適配 (底部抽屜) ==================== */
  @media (max-width: 900px) {
    .layout-grid { grid-template-columns: 1fr; }
    #previewGrid { grid-template-columns: repeat(2, 1fr); padding-bottom: 100px; }
    
    .controls-panel {
      position: fixed; bottom: 0; left: 0; right: 0; top: auto;
      border-radius: 24px 24px 0 0; margin: 0;
      transform: translateY(calc(100% - 65px)); /* 預設收起 */
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 1000; border-bottom: none;
    }
    .controls-panel.open { transform: translateY(0); }
    
    .drawer-handle {
      width: 40px; height: 5px; background: rgba(255,255,255,0.3);
      border-radius: 10px; margin: -10px auto 20px; cursor: pointer;
    }
  }
</style>
</head>
<body>

<header>
  <div class="brand">POGO TOOLS</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="app.switchTab('gen')">展示圖</button>
    <button class="tab-btn" onclick="app.switchTab('comp')">壓縮</button>
    <button class="tab-btn" onclick="app.switchTab('wm')">浮水印</button>
  </div>
</header>

<section id="view-gen" class="view-section active">
  <div class="layout-grid">
    <div class="drop-zone empty" id="genDropZone">
      <div id="genEmptyState">
        <div style="font-size: 48px; margin-bottom: 16px;">🖼️</div>
        <h3>拖拽圖片至此 或 點擊上傳</h3>
        <p style="color:#888; font-size:13px; margin-top:8px;">支援多選 | 自動排序</p>
      </div>
      <div id="previewGrid"></div>
    </div>

    <div class="controls-panel">
      <div class="drawer-handle" onclick="this.parentNode.classList.toggle('open')"></div>
      
      <div class="control-group">
        <button class="btn btn-primary" onclick="document.getElementById('genInput').click()">
          <span>📂 選擇寶可夢截圖</span>
        </button>
      </div>

      <h3>佈局與排序</h3>
      <div class="control-group">
        <label>排列方式</label>
        <select id="genPreset" onchange="app.gen.updateLayout()">
          <option value="auto">✨ 自動排列 (推薦)</option>
          <option value="3x2">3×2 (橫向)</option>
          <option value="2x3">2×3 (直向)</option>
          <option value="3x3">3×3 (9隻)</option>
          <option value="4x4">4×4 (16隻)</option>
          <option value="5x5">5×5 (25隻)</option>
          <option value="6x6">6×6 (36隻)</option>
          <option value="custom">🛠️ 自訂格數...</option>
        </select>
        <div id="genCustomInput" style="display:none; gap:10px; margin-top:10px;">
          <input type="number" id="genCol" value="3" placeholder="寬" oninput="app.gen.updateLayout()">
          <input type="number" id="genRow" value="2" placeholder="高" oninput="app.gen.updateLayout()">
        </div>
      </div>

      <div class="control-group">
        <label>排序方式</label>
        <select id="genSort" onchange="app.gen.sortAndRender()">
          <option value="old-new">📅 時間：舊 → 新</option>
          <option value="new-old">📅 時間：新 → 舊</option>
          <option value="upload">📂 上傳順序</option>
          <option value="manual" disabled>👆 手動拖拽中</option>
        </select>
      </div>

      <h3>視覺微調</h3>
      <div class="control-group">
        <div class="slider-row"><span>間距</span><input type="range" id="genGap" max="100" value="0" oninput="app.gen.updateLayout()"></div>
        <div class="slider-row"><span>圓角</span><input type="range" id="genRadius" max="100" value="0" oninput="app.gen.updateLayout()"></div>
        <div class="slider-row"><span>陰影</span><input type="range" id="genShadow" max="80" value="0" oninput="app.gen.updateLayout()"></div>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-danger" onclick="app.gen.clear()">清空</button>
        <button class="btn btn-secondary" id="genDownBtn" onclick="app.gen.download()" disabled>下載 PNG</button>
      </div>
      <div id="genInfo" style="text-align:center; margin-top:10px; font-size:12px; color:#888;"></div>
    </div>
  </div>
</section>

<section id="view-comp" class="view-section">
  <div style="max-width:800px; margin:0 auto;">
    <div class="drop-zone empty" id="compDropZone" onclick="document.getElementById('compInput').click()" style="height:300px;">
      <div style="text-align:center; pointer-events:none;">
        <div style="font-size: 48px; margin-bottom: 16px;">⚡</div>
        <h3>點擊或拖拽圖片進行壓縮</h3>
        <p style="color:#888;">自動壓至 9.9MB 以下 (Discord/8591 專用)</p>
      </div>
    </div>
    <div id="compList" style="margin-top:20px;"></div>
  </div>
</section>

<section id="view-wm" class="view-section">
  <div class="layout-grid">
    <div id="wmPreviewBox">
      <div id="wmPlaceholder">
        <div style="font-size: 40px; margin-bottom: 16px;">✒️</div>
        <h3>請先上傳圖片</h3>
        <p style="color:#888; font-size:13px;">點擊或拖拽至此</p>
      </div>
      <canvas id="wmCanvas" style="display:none;"></canvas>
    </div>

    <div class="controls-panel">
      <div class="drawer-handle" onclick="this.parentNode.classList.toggle('open')"></div>
      
      <div class="control-group">
        <button class="btn btn-primary" onclick="document.getElementById('wmInput').click()">📂 選擇圖片 (多選)</button>
        <small style="display:block; margin-top:5px; color:#aaa;">已選: <span id="wmCount">0</span> 張</small>
      </div>

      <h3>水印內容</h3>
      <div class="control-group">
        <input type="text" id="wmText" value="© GoldSun Studio" oninput="app.wm.draw()">
        <div style="margin-top:8px;">
          <select id="wmFont" onchange="app.wm.draw()">
            <option value="'Noto Sans TC'">思源黑體 (預設)</option>
            <option value="'jf-openhuninn', 'Noto Sans TC', sans-serif">jf open 粉圓 (可愛)</option>
            <option value="'Taipei Sans TC Beta', 'Noto Sans TC', sans-serif">台北黑體 (現代)</option>
            <option value="'Inter', sans-serif">Inter (英數)</option>
            <option value="'Bebas Neue', display">Bebas Neue (粗體)</option>
          </select>
        </div>
      </div>

      <h3>樣式調整</h3>
      <div class="control-group">
        <div class="slider-row"><span>大小</span><input type="range" id="wmSize" min="10" max="300" value="60" oninput="app.wm.draw()"></div>
        <div class="slider-row"><span>透明</span><input type="range" id="wmOpacity" min="0" max="100" value="70" oninput="app.wm.draw()"></div>
        <div class="slider-row"><span>旋轉</span><input type="range" id="wmRotate" min="0" max="360" value="330" oninput="app.wm.draw()"></div>
        <div class="slider-row"><span>顏色</span><input type="color" id="wmColor" value="#ffffff" oninput="app.wm.draw()" style="height:30px; width:50px;"></div>
      </div>

      <h3>位置模式</h3>
      <div class="control-group">
        <label><input type="checkbox" id="wmTile" onchange="app.wm.toggleMode()"> 啟用平鋪模式</label>
        
        <div id="wmTileControls" style="display:none;">
           <div class="slider-row"><span>間距</span><input type="range" id="wmTileGap" min="50" max="500" value="200" oninput="app.wm.draw()"></div>
        </div>

        <div id="wmPosGrid" class="pos-grid">
          <div class="pos-btn" onclick="app.wm.setPos(0.1,0.1,this)">↖</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.5,0.1,this)">↑</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.9,0.1,this)">↗</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.1,0.5,this)">←</div>
          <div class="pos-btn active" onclick="app.wm.setPos(0.5,0.5,this)">•</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.9,0.5,this)">→</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.1,0.9,this)">↙</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.5,0.9,this)">↓</div>
          <div class="pos-btn" onclick="app.wm.setPos(0.9,0.9,this)">↘</div>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn btn-secondary" onclick="app.wm.downloadSingle()">下載</button>
        <button class="btn btn-primary" id="wmBatchBtn" onclick="app.wm.downloadBatch()" disabled>📦 ZIP 打包</button>
      </div>
      <div id="wmProgress" style="height:3px; background:#333; margin-top:10px; border-radius:2px; overflow:hidden; display:none;">
        <div id="wmProgressBar" style="width:0; height:100%; background:var(--primary);"></div>
      </div>
    </div>
  </div>
</section>

<input type="file" id="genInput" multiple accept="image/*" style="display:none;">
<input type="file" id="compInput" multiple accept="image/*" style="display:none;">
<input type="file" id="wmInput" multiple accept="image/*" style="display:none;">
<canvas id="genCanvas" style="display:none;"></canvas>

<script>
const app = {
  // 切換分頁
  switchTab: (id) => {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    if(id === 'wm' && app.wm.img.src) app.wm.draw();
  },

  // 萬能拖拽綁定
  setupDrag: (zoneId, callback) => {
    const el = document.getElementById(zoneId);
    ['dragenter','dragover','dragleave','drop'].forEach(e => {
      el.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
    });
    el.addEventListener('dragover', () => el.classList.add('drag-over'));
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (ev) => {
      el.classList.remove('drag-over');
      if(ev.dataTransfer.files.length) callback(ev.dataTransfer.files);
    });
  },

  // ==================== 模組 1: 生成器 ====================
  gen: {
    photos: [],
    draggedIdx: null,
    
    init: () => {
      app.setupDrag('genDropZone', app.gen.handleFiles);
      document.getElementById('genInput').onchange = e => app.gen.handleFiles(e.target.files);
    },

    handleFiles: (files) => {
      [...files].forEach(file => {
        if(!file.type.startsWith('image/')) return;
        const img = new Image();
        img.onload = () => {
          app.gen.photos.push({img, ts: file.lastModified});
          app.gen.sortAndRender();
        };
        img.src = URL.createObjectURL(file);
      });
      document.getElementById('genDropZone').classList.remove('empty');
      document.getElementById('genEmptyState').style.display = 'none';
    },

    sortAndRender: () => {
      const mode = document.getElementById('genSort').value;
      if(mode === 'old-new') app.gen.photos.sort((a,b) => a.ts - b.ts);
      else if(mode === 'new-old') app.gen.photos.sort((a,b) => b.ts - a.ts);
      app.gen.render();
    },

    render: () => {
      const grid = document.getElementById('previewGrid');
      grid.innerHTML = '';
      app.gen.photos.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'thumb';
        div.draggable = true;
        div.innerHTML = `<img src="${p.img.src}">`;
        
        div.ondragstart = () => { app.gen.draggedIdx = idx; div.classList.add('dragging'); };
        div.ondragend = () => div.classList.remove('dragging');
        div.ondragover = e => { e.preventDefault(); div.classList.add('drag-over'); };
        div.ondragleave = () => div.classList.remove('drag-over');
        div.ondrop = e => {
          e.preventDefault(); e.stopPropagation();
          const from = app.gen.draggedIdx;
          const to = idx;
          const [moved] = app.gen.photos.splice(from, 1);
          app.gen.photos.splice(to, 0, moved);
          
          const sortSelect = document.getElementById('genSort');
          sortSelect.value = 'manual'; 
          sortSelect.querySelector('option[value="manual"]').disabled = false;
          
          app.gen.render();
        };
        grid.appendChild(div);
      });
      app.gen.updateLayout();
    },

    updateLayout: () => {
      const preset = document.getElementById('genPreset').value;
      const count = app.gen.photos.length;
      let c=3, r=2;

      document.getElementById('genCustomInput').style.display = preset === 'custom' ? 'flex' : 'none';

      if(preset === 'auto') {
        c = Math.ceil(Math.sqrt(count)) || 3;
        r = Math.ceil(count/c) || 2;
      } else if(preset === 'custom') {
        c = +document.getElementById('genCol').value || 3;
        r = +document.getElementById('genRow').value || 2;
      } else {
        [c, r] = preset.split('x').map(Number);
      }

      const grid = document.getElementById('previewGrid');
      const gap = document.getElementById('genGap').value;
      const rad = document.getElementById('genRadius').value;
      const shadow = document.getElementById('genShadow').value;

      grid.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
      grid.style.gap = `${gap}px`;
      
      document.querySelectorAll('.thumb').forEach(t => {
        t.style.borderRadius = `${rad}px`;
        t.style.boxShadow = `0 ${shadow/2}px ${shadow}px rgba(0,0,0,0.6)`;
      });

      document.getElementById('genInfo').innerText = `佈局: ${c}×${r} | 圖片: ${count} 張`;
      document.getElementById('genDownBtn').disabled = count === 0;
      app.gen.layoutCache = {c, r, gap: +gap, rad: +rad, shadow: +shadow};
    },

    clear: () => {
      app.gen.photos = [];
      document.getElementById('previewGrid').innerHTML = '';
      document.getElementById('genEmptyState').style.display = 'block';
      document.getElementById('genDropZone').classList.add('empty');
      app.gen.updateLayout();
    },

    download: () => {
      const {c, r, gap, rad, shadow} = app.gen.layoutCache;
      const cvs = document.getElementById('genCanvas');
      const ctx = cvs.getContext('2d');
      const W = 460, H = 1020; 

      cvs.width = c * W + (c+1) * gap;
      cvs.height = r * H + (r+1) * gap;
      ctx.clearRect(0,0,cvs.width, cvs.height);

      app.gen.photos.slice(0, c*r).forEach((p, i) => {
        const col = i % c, row = Math.floor(i / c);
        const x = gap + col * (W + gap);
        const y = gap + row * (H + gap);

        ctx.save();
        if(shadow > 0) {
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = shadow * 2;
          ctx.shadowOffsetY = shadow;
        }
        
        ctx.beginPath();
        ctx.roundRect(x, y, W, H, rad);
        ctx.clip();

        const img = p.img;
        const scale = Math.max(W/img.naturalWidth, H/img.naturalHeight);
        const dw = img.naturalWidth * scale;
        const dh = img.naturalHeight * scale;
        ctx.drawImage(img, x+(W-dw)/2, y+(H-dh)/2, dw, dh);
        ctx.restore();
      });

      cvs.toBlob(blob => {
        const link = document.createElement('a');
        link.download = `POGO_Grid_${Date.now()}.png`;
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    }
  },

  // ==================== 模組 2: 壓縮工具 ====================
  comp: {
    init: () => {
      app.setupDrag('compDropZone', app.comp.process);
      document.getElementById('compInput').onchange = e => app.comp.process(e.target.files);
    },

    process: (files) => {
      document.getElementById('compDropZone').classList.remove('empty');
      [...files].forEach(file => {
        if(!file.type.startsWith('image/')) return;
        const id = Math.random().toString(36).substr(2,9);
        const div = document.createElement('div');
        div.className = 'file-item';
        div.id = id;
        div.innerHTML = `<div><strong>${file.name}</strong></div><div>⏳</div>`;
        document.getElementById('compList').prepend(div);

        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const cvs = document.createElement('canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = img.width; cvs.height = img.height;
            ctx.drawImage(img, 0, 0);

            let q = 0.95, mb = 0, dataUrl;
            do {
              dataUrl = cvs.toDataURL('image/jpeg', q);
              mb = dataUrl.length * 0.75 / 1024 / 1024;
              q -= 0.1;
            } while(mb > 9.9 && q > 0.1);

            const org = (file.size/1024/1024).toFixed(2);
            const save = (100 - (mb/org*100)).toFixed(1);
            
            div.innerHTML = `
              <div>
                <strong>${file.name}</strong> <span class="tag">-${save}%</span><br>
                <span style="font-size:12px; color:#aaa;">${org}MB ➝ ${mb.toFixed(2)}MB</span>
              </div>
              <a href="${dataUrl}" download="Min_${file.name.split('.')[0]}.jpg" class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:12px;">下載</a>
            `;
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
  },

  // ==================== 模組 3: 浮水印 Pro ====================
  wm: {
    img: new Image(),
    files: [],
    settings: { x:0.5, y:0.5 },

    init: () => {
      app.setupDrag('wmPreviewBox', app.wm.handleFiles);
      document.getElementById('wmInput').onchange = e => app.wm.handleFiles(e.target.files);
    },

    handleFiles: (files) => {
      app.wm.files = Array.from(files);
      document.getElementById('wmCount').innerText = app.wm.files.length;
      document.getElementById('wmBatchBtn').disabled = app.wm.files.length < 2;
      
      if(app.wm.files.length > 0) {
        const reader = new FileReader();
        reader.onload = e => {
          app.wm.img.src = e.target.result;
          app.wm.img.onload = () => {
             document.getElementById('wmPlaceholder').style.display = 'none';
             document.getElementById('wmCanvas').style.display = 'block';
             app.wm.draw();
          }
        };
        reader.readAsDataURL(app.wm.files[0]);
      }
    },

    toggleMode: () => {
      const tile = document.getElementById('wmTile').checked;
      document.getElementById('wmTileControls').style.display = tile ? 'block' : 'none';
      document.getElementById('wmPosGrid').style.opacity = tile ? '0.3' : '1';
      document.getElementById('wmPosGrid').style.pointerEvents = tile ? 'none' : 'auto';
      app.wm.draw();
    },

    setPos: (x, y, btn) => {
      app.wm.settings.x = x;
      app.wm.settings.y = y;
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      app.wm.draw();
    },

    draw: () => {
      if(!app.wm.img.src) return;
      const cvs = document.getElementById('wmCanvas');
      const ctx = cvs.getContext('2d');
      const box = document.getElementById('wmPreviewBox');

      const scale = Math.min((box.clientWidth-40)/app.wm.img.width, (box.clientHeight-40)/app.wm.img.height);
      cvs.width = app.wm.img.width * scale;
      cvs.height = app.wm.img.height * scale;
      
      ctx.drawImage(app.wm.img, 0, 0, cvs.width, cvs.height);

      const text = document.getElementById('wmText').value;
      const font = document.getElementById('wmFont').value;
      const size = +document.getElementById('wmSize').value;
      const opacity = +document.getElementById('wmOpacity').value / 100;
      const color = document.getElementById('wmColor').value;
      const rotate = +document.getElementById('wmRotate').value * Math.PI / 180;
      const isTile = document.getElementById('wmTile').checked;

      ctx.save();
      const ratio = cvs.width / app.wm.img.width;
      const finalSize = size * ratio;
      
      ctx.font = `bold ${finalSize}px ${font}`;
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if(isTile) {
        const gap = +document.getElementById('wmTileGap').value * ratio;
        for(let x=0; x<cvs.width; x+=gap) {
          for(let y=0; y<cvs.height; y+=gap) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotate);
            ctx.fillText(text, 0, 0);
            ctx.restore();
          }
        }
      } else {
        const {x, y} = app.wm.settings;
        ctx.translate(cvs.width * x, cvs.height * y);
        ctx.rotate(rotate);
        ctx.fillText(text, 0, 0);
      }
      ctx.restore();
    },

    processImage: (imgObj) => {
      const cvs = document.createElement('canvas');
      const ctx = cvs.getContext('2d');
      cvs.width = imgObj.width;
      cvs.height = imgObj.height;
      
      ctx.drawImage(imgObj, 0, 0);
      
      const text = document.getElementById('wmText').value;
      const font = document.getElementById('wmFont').value;
      const size = +document.getElementById('wmSize').value;
      const opacity = +document.getElementById('wmOpacity').value / 100;
      const color = document.getElementById('wmColor').value;
      const rotate = +document.getElementById('wmRotate').value * Math.PI / 180;
      const isTile = document.getElementById('wmTile').checked;

      ctx.save();
      ctx.font = `bold ${size}px ${font}`;
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if(isTile) {
        const gap = +document.getElementById('wmTileGap').value;
        for(let x=0; x<cvs.width; x+=gap) {
          for(let y=0; y<cvs.height; y+=gap) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotate);
            ctx.fillText(text, 0, 0);
            ctx.restore();
          }
        }
      } else {
        const {x, y} = app.wm.settings;
        ctx.translate(cvs.width * x, cvs.height * y);
        ctx.rotate(rotate);
        ctx.fillText(text, 0, 0);
      }
      ctx.restore();
      return cvs;
    },

    downloadSingle: () => {
      if(!app.wm.img.src) return;
      const cvs = app.wm.processImage(app.wm.img);
      const link = document.createElement('a');
      link.download = `Watermark_${Date.now()}.jpg`;
      link.href = cvs.toDataURL('image/jpeg', 0.95);
      link.click();
    },

    downloadBatch: async () => {
      const zip = new JSZip();
      const progress = document.getElementById('wmProgressBar');
      document.getElementById('wmProgress').style.display = 'block';

      for(let i=0; i<app.wm.files.length; i++) {
        const file = app.wm.files[i];
        const img = await new Promise(r => {
          const image = new Image();
          image.onload = () => r(image);
          image.src = URL.createObjectURL(file);
        });
        
        const cvs = app.wm.processImage(img);
        const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.95));
        zip.file(`WM_${file.name}`, blob);
        progress.style.width = `${((i+1)/app.wm.files.length)*100}%`;
      }

      const content = await zip.generateAsync({type:"blob"});
      const link = document.createElement('a');
      link.download = `Batch_WM_${Date.now()}.zip`;
      link.href = URL.createObjectURL(content);
      link.click();
      document.getElementById('wmProgress').style.display = 'none';
    }
  }
};

// 啟動
app.gen.init();
app.comp.init();
app.wm.init();
</script>
</body>
</html>
