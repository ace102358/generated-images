<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>POGO萬能展示圖生成器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    margin: 0;
    padding: 0 340px 20px 20px;
    background: #000000;
    font-family: -apple-system, system-ui, sans-serif;
    color: #fff;
    min-height: 100vh;
    transition: all .2s;
  }

  h1 { text-align: center; padding: 20px 0 10px; font-size: 26px; }
  .desc { text-align: center; margin: 20px auto; padding: 0 15px; max-width: 800px; }
  #picker { display: none; }

  #preview {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    padding: 20px 20px 100px 0;
    max-width: 1400px;
    margin: 0 auto;
    transition: all .2s;
  }

  .thumb {
    aspect-ratio: 0.466;
    border-radius: 36px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    transition: all .15s ease;
    cursor: grab;
    user-select: none;
    position: relative;
  }

  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb.dragging { opacity: 0.75; transform: scale(1.08) rotate(2deg); z-index: 100; }
  .thumb.drag-over { border: 3px dashed #bb86fc; transform: scale(1.05); }

  body.drag-over { border: 6px dashed #bb86fc; background: rgba(187, 134, 252, 0.12); }
  
  .controls {
    position: fixed; top: 0; right: 0; bottom: 0; width: 320px;
    padding: 20px 16px; background: rgba(26, 0, 51, 0.95);
    backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.12);
    overflow-y: auto; z-index: 1000;
  }

  #uploadBtn {
    width: 100%; padding: 18px 16px; margin: 8px 0 24px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #cf9eff, #7b4dff); color: #000;
    font-size: 18px; font-weight: bold; cursor: pointer;
  }

  .controls select, .controls input:not([type="range"]), .controls button {
    width: 100%; padding: 12px 16px; margin: 8px 0; border-radius: 12px;
    border: none; font-size: 16px; box-sizing: border-box;
  }

  .controls select, .controls input:not([type="range"]) { background: #2a1a44; color: #fff; }
  .controls button#clear { background: #ff4d4d; color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .controls button#download { background: #bb86fc; color: #000; font-weight: bold; cursor: pointer; }

  @media (max-width: 800px) {
    body { padding: 0 0 380px 0; }
    .controls { top: auto; bottom: 0; width: 100%; max-height: 380px; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
    #preview { padding: 20px 15px 400px; }
  }
</style>
</head>
<body id="dropZone">

<h1>POGO展示圖生成器 By 金昇工作室</h1>
<p class="desc">支援 1×1 到 10×10 任意格數｜支援手動拖拽排序</p>

<div id="preview"></div>

<div class="controls">
  <h3>📤 上傳圖片</h3>
  <button id="uploadBtn">點擊或拖拽圖片到此處</button>

  <h3>排列與排序</h3>
  <div>
    <label>排列方式</label>
    <select id="preset">
      <option value="auto">自動排列</option>
      <option value="3x2">3×2（橫向）</option>
      <option value="2x3">2×3（直向）</option>
      <option value="3x3">3×3（9隻）</option>
      <option value="4x4">4×4（16隻）</option>
      <option value="custom">自訂格數 →</option>
    </select>
    <div id="customInputs" style="display:none; margin:12px 0;">
      寬 <input type="number" id="cols" min="1" max="10" value="3" style="width:60px;"> 
      高 <input type="number" id="rows" min="1" max="10" value="2" style="width:60px;">
    </div>
  </div>

  <div>
    <label>排序方式</label>
    <select id="sortMode">
      <option value="upload">上傳順序</option>
      <option value="old-new" selected>時間順序（舊→新）</option>
      <option value="new-old">時間順序（新→舊）</option>
      <option value="manual" disabled>手動調整中</option>
    </select>
  </div>

  <h3>視覺調整</h3>
  <div class="slider">間距 <input type="range" id="gap" min="0" max="120" value="0"><b id="g">0px</b></div>
  <div class="slider">圓角 <input type="range" id="radius" min="0" max="100" value="0"><b id="r">0px</b></div>
  <div class="slider">陰影 <input type="range" id="shadow" min="0" max="80" value="0"><b id="s">0px</b></div>

  <button id="download" disabled>生成透明背景大圖</button>
  <button id="clear">清空全部</button>
  <div id="info" style="margin-top:24px; font-size: 14px; opacity: 0.8;"></div>
</div>

<input type="file" id="picker" multiple accept="image/*">
<canvas id="canvas" style="display:none;"></canvas>

<script>
let photos = [];
let draggedItem = null;

const picker = document.getElementById('picker');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sortMode = document.getElementById('sortMode');
const preset = document.getElementById('preset');
const gapSlider = document.getElementById('gap');
const radiusSlider = document.getElementById('radius');
const shadowSlider = document.getElementById('shadow');

// 圖片加載處理
function handleFiles(files) {
  [...files].forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const img = new Image();
    img.onload = () => {
      photos.push({ img, timestamp: file.lastModified, id: Math.random() });
      renderPreview();
      updateLayout();
    };
    img.src = URL.createObjectURL(file);
  });
}

// 獲取當前排序後的圖片陣列 (關鍵修正處)
function getSortedPhotos() {
  let sorted = [...photos];
  if (sortMode.value === 'old-new') sorted.sort((a,b)=>a.timestamp - b.timestamp);
  else if (sortMode.value === 'new-old') sorted.sort((a,b)=>b.timestamp - a.timestamp);
  return sorted;
}

function renderPreview() {
  preview.innerHTML = '';
  const sorted = getSortedPhotos();

  sorted.forEach((photo, index) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.draggable = true;
    div.dataset.index = index;
    div.innerHTML = `<img src="${photo.img.src}">`;

    div.ondragstart = (e) => {
      draggedItem = index;
      div.classList.add('dragging');
    };

    div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
    div.ondragleave = () => div.classList.remove('drag-over');

    div.ondrop = (e) => {
      e.preventDefault();
      const fromIndex = draggedItem;
      const toIndex = index;
      
      // 根據當前顯示順序重新調整原始陣列
      const currentSorted = getSortedPhotos();
      const [moved] = currentSorted.splice(fromIndex, 1);
      currentSorted.splice(toIndex, 0, moved);
      
      photos = currentSorted; // 更新原始陣列為手動排序後的結果
      sortMode.value = 'manual';
      sortMode.querySelector('option[value="manual"]').disabled = false;
      
      renderPreview();
      updateLayout();
    };

    preview.appendChild(div);
  });
}

function updateLayout() {
  const {cols, rows} = getGrid();
  preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  preview.style.gap = gapSlider.value + 'px';
  
  document.querySelectorAll('.thumb').forEach(t => {
    t.style.borderRadius = radiusSlider.value + 'px';
  });

  document.getElementById('g').textContent = gapSlider.value + 'px';
  document.getElementById('r').textContent = radiusSlider.value + 'px';
  document.getElementById('s').textContent = shadowSlider.value + 'px';
  
  const total = cols * rows;
  document.getElementById('info').textContent = `格數：${cols}×${rows}，已選：${photos.length} 張`;
  document.getElementById('download').disabled = photos.length === 0;
}

function getGrid() {
  if (preset.value === 'auto') {
    const n = photos.length;
    if (n <= 6) return {cols:3, rows:2};
    const s = Math.ceil(Math.sqrt(n));
    return {cols:s, rows:Math.ceil(n/s)};
  }
  if (preset.value === 'custom') {
    return {cols: parseInt(document.getElementById('cols').value), rows: parseInt(document.getElementById('rows').value)};
  }
  const [c, r] = preset.value.split('x');
  return {cols: parseInt(c), rows: parseInt(r)};
}

// 下載功能 (關鍵修正：使用 getSortedPhotos)
document.getElementById('download').onclick = () => {
  const {cols, rows} = getGrid();
  const sorted = getSortedPhotos(); // 獲取正確順序
  const gap = +gapSlider.value;
  const radius = +radiusSlider.value;
  const W = 460, H = 1020;

  canvas.width = cols * W + (cols + 1) * gap;
  canvas.height = rows * H + (rows + 1) * gap;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  sorted.slice(0, cols * rows).forEach((photo, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = gap + col * (W + gap);
    const y = gap + row * (H + gap);

    ctx.save();
    // 繪製圓角路徑
    ctx.beginPath();
    ctx.roundRect(x, y, W, H, radius);
    ctx.clip();

    // 計算適配比例
    const img = photo.img;
    const scale = Math.max(W / img.naturalWidth, H / img.naturalHeight);
    const dw = img.naturalWidth * scale;
    const dh = img.naturalHeight * scale;
    ctx.drawImage(img, x + (W - dw)/2, y + (H - dh)/2, dw, dh);
    ctx.restore();
  });

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `POGO_Export_${new Date().getTime()}.png`;
    a.click();
  }, 'image/png');
};

// 事件監聽
document.getElementById('uploadBtn').onclick = () => picker.click();
picker.onchange = (e) => handleFiles(e.target.files);
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); };

preset.onchange = () => {
  document.getElementById('customInputs').style.display = preset.value === 'custom' ? 'block' : 'none';
  updateLayout();
};
sortMode.onchange = () => { renderPreview(); updateLayout(); };
gapSlider.oninput = radiusSlider.oninput = shadowSlider.oninput = updateLayout;
document.getElementById('cols').oninput = document.getElementById('rows').oninput = updateLayout;

document.getElementById('clear').onclick = () => {
  photos = [];
  renderPreview();
  updateLayout();
  sortMode.value = 'old-new';
  sortMode.querySelector('option[value="manual"]').disabled = true;
};
</script>
</body>
</html>
